<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Predictor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <button class="cta-btn">Call To Action</button>
            <button class="nav-btn">Navigation</button>
        </nav>
    </header>
    <section class="team-card">
        <h2>Team Card</h2>
    </section>
    <section class="lb-row">
        <div class="rank-badge">1</div>
    </section>
    <div class="warning-box">Warning</div>
    <div class="error-box">Error</div>
    <button class="admin-team-btn">Admin Team</button>
    <script src="script.js"></script>
</body>
</html>
<style>
.cta-btn {
    font-weight: 800;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
}
.nav-btn {
    transition: all 0.2s;
}
.lock-btn {
    font-weight: 800;
    letter-spacing: 1.5px;
    cursor: pointer;
    opacity: 0.4;
    transition: all 0.2s;
}
.team-card {
    transition: all 0.2s;
    background: var(--surface);
}
.rank-badge {
    font-weight: 900;
}
.warning-box {
    display: none;
}
.lb-row {
    gap: 12px;
    flex-wrap: wrap;
}
.error-box {
    position: relative;
    z-index: 1;
    display: none;
}
.admin-team-btn {
    transition: all 0.2s;
}
</style>
